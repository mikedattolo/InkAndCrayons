<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <filter id="s1-wc" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="s1-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="30" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="g" mode="soft-light"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="s1-shadow" x="-15%" y="-10%" width="130%" height="135%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feOffset dx="2" dy="3" result="o"/>
      <feFlood flood-color="#8a5078" flood-opacity="0.10" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="s1splat" cx="0.45" cy="0.48" r="0.55">
      <stop offset="0%" stop-color="#f7a8c4" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#f7a8c4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f7a8c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1inner" cx="0.48" cy="0.46" r="0.45">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#fff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#fce4ec" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <g filter="url(#s1-shadow)">
    <!-- Watercolor splat -->
    <ellipse cx="40" cy="40" rx="38" ry="36" fill="url(#s1splat)" filter="url(#s1-wc)"/>
    <!-- Inner circle with grain -->
    <circle cx="40" cy="40" r="28" fill="url(#s1inner)" stroke="#f7a8c4" stroke-width="2.2" filter="url(#s1-grain)"/>
    <!-- Watercolor ring accent -->
    <circle cx="40" cy="40" r="25" fill="none" stroke="#f7a8c4" stroke-width="0.5" opacity="0.20"/>
    <!-- Number -->
    <text x="40" y="49" font-size="22" fill="#d4608a" font-family="Georgia,serif" font-weight="700" text-anchor="middle">1</text>
  </g>
</svg>