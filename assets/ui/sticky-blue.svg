<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="sb-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.1 0.5" numOctaves="4" seed="21" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0" result="gBW"/>
      <feBlend in="SourceGraphic" in2="gBW" mode="multiply" result="grained"/>
      <feComposite in="grained" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="sb-wc" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="5" seed="41" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sb-shadow" x="-8%" y="-5%" width="120%" height="130%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feOffset dx="3" dy="6" result="o"/>
      <feFlood flood-color="#486888" flood-opacity="0.09" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sb-tape" x="-5%" y="-10%" width="110%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.07 0.2" numOctaves="3" seed="62" result="tw"/>
      <feDisplacementMap in="SourceGraphic" in2="tw" scale="1.5"/>
    </filter>

    <linearGradient id="sbGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e8f2fc"/>
      <stop offset="25%" stop-color="#d0e4f8"/>
      <stop offset="60%" stop-color="#c4daf2"/>
      <stop offset="85%" stop-color="#c8def4"/>
      <stop offset="100%" stop-color="#b8d0e8"/>
    </linearGradient>
    <radialGradient id="sbPool" cx="0.2" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="#88b8d8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#88b8d8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#sb-shadow)">
    <g filter="url(#sb-wc)">
      <path d="M 14,13 L 187,11 Q 189,13 187,175 Q 186,190 173,189 L 13,186 Q 11,184 14,13 Z"
            fill="url(#sbGrad)"/>
      <path d="M 14,13 L 187,11 Q 189,13 187,175 Q 186,190 173,189 L 13,186 Q 11,184 14,13 Z"
            fill="#fff" opacity="0.04" filter="url(#sb-grain)"/>
      <path d="M 14,13 L 187,11 Q 189,13 187,175 Q 186,190 173,189 L 13,186 Q 11,184 14,13 Z"
            fill="url(#sbPool)"/>
      <line x1="20" y1="54" x2="182" y2="52" stroke="#88b0d0" stroke-width="0.3" opacity="0.10"/>
      <line x1="18" y1="100" x2="184" y2="98" stroke="#88b0d0" stroke-width="0.3" opacity="0.08"/>
      <line x1="20" y1="146" x2="180" y2="144" stroke="#88b0d0" stroke-width="0.3" opacity="0.07"/>
    </g>

    <!-- Corner curl -->
    <g opacity="0.5">
      <path d="M 171,173 Q 183,171 187,175 L 187,190 Q 179,192 173,189 Z" fill="#90b8d8"/>
      <path d="M 173,175 Q 181,174 184,177 L 184,187 Q 178,189 175,188 Z" fill="#e4f0fc" opacity="0.5"/>
    </g>

    <!-- Tape (pink-tinted for warmth) -->
    <g filter="url(#sb-tape)">
      <rect x="67" y="0" width="58" height="22" rx="1.5"
            fill="#f7a8c4" opacity="0.30" transform="rotate(2.2, 96, 11)"/>
      <line x1="71" y1="6" x2="121" y2="8" stroke="#fff" stroke-width="0.8" opacity="0.22" transform="rotate(2.2, 96, 11)"/>
      <line x1="73" y1="14" x2="119" y2="16" stroke="#e8a0b0" stroke-width="0.5" opacity="0.12" transform="rotate(2.2, 96, 11)"/>
      <line x1="67" y1="1" x2="125" y2="3" stroke="#e8a0b0" stroke-width="0.3" opacity="0.18" transform="rotate(2.2, 96, 11)"/>
    </g>
  </g>
</svg>