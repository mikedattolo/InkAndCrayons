<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none" fill="none">
  <defs>
    <!-- Heavy distortion for messy scribble edges -->
    <filter id="sc-warp" x="-8%" y="-40%" width="116%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.035" numOctaves="6" seed="7" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Secondary wobble -->
    <filter id="sc-wobble" x="-6%" y="-30%" width="112%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03 0.05" numOctaves="4" seed="33" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="6" xChannelSelector="G" yChannelSelector="R"/>
    </filter>

    <!-- Paper grain -->
    <filter id="sc-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7 0.9" numOctaves="4" seed="55" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0" result="gBW"/>
      <feBlend in="SourceGraphic" in2="gBW" mode="soft-light" result="tex"/>
      <feComposite in="tex" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Soft blur for bleed effect -->
    <filter id="sc-bleed" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="2 1"/>
    </filter>

    <!-- Lavender -->
    <linearGradient id="sc-lav" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a8f7" stop-opacity="0"/>
      <stop offset="8%" stop-color="#c9a8f7" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#d4b8f0" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#c9a8f7" stop-opacity="0.35"/>
      <stop offset="75%" stop-color="#d0b0f0" stop-opacity="0.45"/>
      <stop offset="92%" stop-color="#c9a8f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a8f7" stop-opacity="0"/>
    </linearGradient>

    <!-- Pink -->
    <linearGradient id="sc-pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7a8c4" stop-opacity="0"/>
      <stop offset="10%" stop-color="#f0b0c8" stop-opacity="0.30"/>
      <stop offset="28%" stop-color="#f7a8c4" stop-opacity="0.50"/>
      <stop offset="50%" stop-color="#f5b8cc" stop-opacity="0.40"/>
      <stop offset="70%" stop-color="#f7a8c4" stop-opacity="0.48"/>
      <stop offset="88%" stop-color="#f0b0c8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#f7a8c4" stop-opacity="0"/>
    </linearGradient>

    <!-- Peach -->
    <linearGradient id="sc-peach" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fcd8b0" stop-opacity="0"/>
      <stop offset="15%" stop-color="#fce0c0" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#fcd8b0" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#fce0c0" stop-opacity="0.35"/>
      <stop offset="85%" stop-color="#fcd8b0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fcd8b0" stop-opacity="0"/>
    </linearGradient>

    <!-- Blue -->
    <linearGradient id="sc-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a8d4f7" stop-opacity="0"/>
      <stop offset="12%" stop-color="#b0d8f0" stop-opacity="0.25"/>
      <stop offset="38%" stop-color="#a8d4f7" stop-opacity="0.40"/>
      <stop offset="62%" stop-color="#b0d8f0" stop-opacity="0.32"/>
      <stop offset="82%" stop-color="#a8d4f7" stop-opacity="0.38"/>
      <stop offset="95%" stop-color="#b0d8f0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a8d4f7" stop-opacity="0"/>
    </linearGradient>

    <!-- Edge fade mask -->
    <linearGradient id="sc-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="5%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="12%" stop-color="white" stop-opacity="1"/>
      <stop offset="88%" stop-color="white" stop-opacity="1"/>
      <stop offset="95%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="sc-mask">
      <rect x="0" y="0" width="1200" height="120" fill="url(#sc-fade)"/>
    </mask>
  </defs>

  <g mask="url(#sc-mask)">
    <!-- Scribble layer 1: Big messy lavender loops -->
    <g filter="url(#sc-warp)" opacity="0.6">
      <path d="M 20,55 Q 80,30 160,65 Q 240,90 320,45 Q 400,15 480,60 Q 560,95 640,50 Q 720,20 800,65 Q 880,95 960,48 Q 1040,18 1120,58 Q 1160,75 1190,55"
            stroke="url(#sc-lav)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
      <path d="M 40,62 Q 130,38 220,70 Q 310,92 400,50 Q 490,22 580,68 Q 670,88 760,48 Q 850,25 940,62 Q 1030,85 1120,52"
            stroke="url(#sc-lav)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5" filter="url(#sc-grain)"/>
    </g>

    <!-- Scribble layer 2: Pink crayon scrawl -->
    <g filter="url(#sc-warp)" opacity="0.55">
      <path d="M 10,50 Q 100,80 200,42 Q 300,18 400,62 Q 500,88 600,45 Q 700,15 800,58 Q 900,85 1000,42 Q 1100,25 1180,55"
            stroke="url(#sc-pink)" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
      <path d="M 60,48 Q 150,75 250,38 Q 350,12 450,58 Q 550,82 650,42 Q 750,18 850,55 Q 950,80 1050,45 Q 1140,28 1180,50"
            stroke="url(#sc-pink)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4" filter="url(#sc-grain)"/>
    </g>

    <!-- Scribble layer 3: Peach overlapping strokes -->
    <g filter="url(#sc-wobble)" opacity="0.45">
      <path d="M 80,58 Q 180,35 280,65 Q 380,85 480,48 Q 580,22 680,62 Q 780,82 880,45 Q 980,28 1080,58"
            stroke="url(#sc-peach)" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
      <path d="M 120,52 Q 220,78 320,42 Q 420,20 520,60 Q 620,80 720,45 Q 820,22 920,55 Q 1020,75 1100,48"
            stroke="url(#sc-peach)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.35" filter="url(#sc-grain)"/>
    </g>

    <!-- Scribble layer 4: Blue loose scribbles -->
    <g filter="url(#sc-warp)" opacity="0.4">
      <path d="M 50,60 Q 140,28 230,68 Q 320,90 410,42 Q 500,15 590,62 Q 680,88 770,48 Q 860,20 950,60 Q 1040,82 1130,50"
            stroke="url(#sc-blue)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
    </g>

    <!-- Scribble layer 5: Messy back-and-forth hatching -->
    <g filter="url(#sc-wobble)" opacity="0.25">
      <path d="M 100,55 L 160,40 L 140,65 L 200,35 L 180,68 L 240,38 L 220,62 L 300,42 L 280,58"
            stroke="#d4b8f0" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
      <path d="M 400,50 L 460,72 L 440,38 L 520,68 L 500,35 L 580,65 L 560,40 L 640,60"
            stroke="#f5b8cc" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
      <path d="M 700,58 L 760,35 L 740,68 L 820,40 L 800,62 L 880,38 L 860,65 L 940,42"
            stroke="#fce0c0" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
      <path d="M 950,52 L 1010,70 L 990,38 L 1060,62 L 1040,42 L 1100,58 L 1080,45 L 1150,55"
            stroke="#b0d8f0" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#sc-grain)"/>
    </g>

    <!-- Scribble layer 6: Pigment blobs and splatters -->
    <g filter="url(#sc-bleed)" opacity="0.3">
      <ellipse cx="180" cy="55" rx="18" ry="8" fill="#c9a8f7" transform="rotate(-8,180,55)"/>
      <ellipse cx="380" cy="48" rx="14" ry="6" fill="#f7a8c4" transform="rotate(5,380,48)"/>
      <ellipse cx="550" cy="60" rx="20" ry="7" fill="#fcd8b0" transform="rotate(-12,550,60)"/>
      <ellipse cx="750" cy="50" rx="16" ry="6" fill="#d4b8f0" transform="rotate(8,750,50)"/>
      <ellipse cx="920" cy="55" rx="12" ry="5" fill="#a8d4f7" transform="rotate(-6,920,55)"/>
      <ellipse cx="1060" cy="52" rx="15" ry="6" fill="#f0b0c8" transform="rotate(10,1060,52)"/>
      <circle cx="280" cy="62" r="4" fill="#e8c0d8" opacity="0.5"/>
      <circle cx="620" cy="42" r="3" fill="#c0b8e8" opacity="0.4"/>
      <circle cx="840" cy="65" r="5" fill="#f0c8b0" opacity="0.4"/>
    </g>
  </g>
</svg>
