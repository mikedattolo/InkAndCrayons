<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" fill="none">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Shiny gold gradient for the ampersand -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Watercolor filter for organic texture -->
    <filter id="watercolor" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>
  
  <!-- Watercolor light black background -->
  <g filter="url(#watercolor)" opacity="0.15">
    <ellipse cx="170" cy="45" rx="165" ry="40" fill="#2a2a2a"/>
  </g>
  <g opacity="0.08">
    <ellipse cx="170" cy="45" rx="140" ry="35" fill="#1a1a1a"/>
  </g>
  
  <!-- Simple, elegant wordmark -->
  <!-- "ink" in italic serif with light black outline -->
  <text x="8" y="52" font-size="42" fill="#7a5abf" stroke="#3a3a3a" stroke-width="1.5" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-style="italic" letter-spacing="1">ink</text>
  
  <!-- "&" ampersand in textured shiny gold -->
  <text x="100" y="52" font-size="28" fill="url(#goldGradient)" stroke="#d4af37" stroke-width="0.8" font-family="Georgia,serif" font-style="italic" filter="url(#watercolor)">
    &amp;
  </text>
  
  <!-- "crayons" in lighter serif with light black outline -->
  <text x="128" y="52" font-size="36" fill="#e88aab" stroke="#3a3a3a" stroke-width="1.2" font-family="Georgia,'Times New Roman',serif" font-weight="400" letter-spacing="3">crayons</text>
  
  <!-- Minimal decorative accent — a small crayon tip -->
  <g transform="translate(320,20)" opacity="0.6">
    <rect x="0" y="8" width="6" height="28" rx="1.5" fill="#c9a8f7" stroke="#3a3a3a" stroke-width="0.5"/>
    <polygon points="0,8 3,0 6,8" fill="#a07fe8" stroke="#3a3a3a" stroke-width="0.5"/>
  </g>
</svg>